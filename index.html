<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DVAYD Publishing</title>

  <script>
    (function () {
      const isGitHubPages = location.hostname.includes('github.io');
      const BASE_PATH = isGitHubPages ? '/dva_redo' : '';
      const target = BASE_PATH + '/tr/index.html';
      if (!location.pathname.endsWith('/tr/index.html')) {
        location.replace(target);
      }
    })();
  </script>

  <noscript>
    <meta http-equiv="refresh" content="0; url=/tr/index.html">
  </noscript>

  <style>
    body {
      margin: 0; padding: 0;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #b8966e 0%, #8a6a48 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
    }
    .loader { text-align: center; }
    .spinner {
      width: 40px; height: 40px;
      margin: 0 auto 20px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 24px; font-weight: 700; margin: 0 0 10px; }
    p  { font-size: 14px; opacity: 0.9; }
    a  { color: #fff; text-decoration: underline; margin-top: 20px; display: inline-block; }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <h1>DVAYD Publishing</h1>
    <p>Yönlendiriliyor…</p>
    <p>
      <a href="/tr/index.html">
        Otomatik yönlendirme çalışmazsa buraya tıklayın
      </a>
    </p>
  </div>
