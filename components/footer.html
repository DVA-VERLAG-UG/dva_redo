<!-- Netlify Form Detection (hidden) — muss im DOM sein beim Build -->
<form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="text"  name="vorname"/>
  <input type="text"  name="nachname"/>
  <input type="email" name="email"/>
  <input type="tel"   name="telefon"/>
  <textarea           name="nachricht"></textarea>
</form>

<footer class="dv-footer">
  <div class="dv-footer-inner">

    <!-- LET'S TALK -->
    <div class="dv-footer-cta" id="footerCta">
      <button class="footer-talk-btn" id="footerConfigBtn" type="button"></button>
    </div>

    <!-- GRID -->
    <div class="dv-footer-grid">
      <div id="footer-col-main"></div>
      <div id="footer-col-services"></div>
      <div id="footer-col-knowledge"></div>

      <div class="dv-contact">
        <div class="dv-ftitle" id="footer-contact-title"></div>
        <strong>+49 40 0000000</strong>
        <strong>info@dva-yd.com</strong>
        <span id="footer-tagline"></span>
        <div class="dv-social">
          <a href="https://twitter.com/dvaydpublishing" target="_blank" rel="noopener">
            <img src="../assets/images/social_media/x.png" alt="X">
          </a>
          <a href="https://instagram.com/dvaydpublishing" target="_blank" rel="noopener">
            <img src="../assets/images/social_media/instagram.png" alt="Instagram">
          </a>
          <a href="https://youtube.com/@dvaydpublishing" target="_blank" rel="noopener">
            <img src="../assets/images/social_media/youtube.png" alt="YouTube">
          </a>
          <a href="https://linkedin.com/company/dvaydpublishing" target="_blank" rel="noopener">
            <img src="../assets/images/social_media/linkedin.png" alt="LinkedIn">
          </a>
        </div>
      </div>
    </div>

    <!-- BOTTOM — befüllt komplett durch footer.js -->
    <div class="dv-footer-bottom">
      <div class="dv-footer-brand">
        <img src="../assets/images/branding/dva-logo.png" alt="DVAYD Logo">
        <span>DVAYD Publishing</span>
      </div>
      <div class="dv-footer-legal">
        <span id="footer-year"></span>
      </div>
    </div>

  </div>
</footer>
