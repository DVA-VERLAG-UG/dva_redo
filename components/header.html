<header class="site-header" id="site-header">
  <div class="header-inner">
    
    <!-- Logo/Brand -->
    <a href="index.html" class="brand" aria-label="DVAYD Publishing Home">
      <img src="../assets/images/branding/dva-logo.png" alt="DVAYD Logo" class="brand-logo">
      <span class="brand-name">DVAYD Publishing</span>
    </a>

    <!-- Right Side: Search, Theme, Languages, Menu -->
    <div class="header-right">
      
      <!-- Search Bar -->
      <div class="search-wrapper">
        <form class="search-form" role="search">
          <input 
            type="search" 
            class="search-input" 
            placeholder="Search…" 
            aria-label="Search"
            id="headerSearchInput"
            autocomplete="off"
          >
          <button type="submit" class="search-btn" aria-label="Search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
          </button>
          
          <!-- Search Results Dropdown -->
          <div class="search-dropdown" id="searchDropdown"></div>
        </form>
      </div>

      <!-- Theme Toggle -->
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">
        <span class="theme-icon theme-icon-moon">🌙</span>
        <span class="theme-icon theme-icon-sun">☀️</span>
      </button>

      <!-- Language Switcher (Desktop) -->
      <div class="lang-switcher">
        <a href="/de/" data-lang="de" class="lang-link">DE</a>
        <span class="lang-sep">|</span>
        <a href="/en/" data-lang="en" class="lang-link">EN</a>
        <span class="lang-sep">|</span>
        <a href="/tr/" data-lang="tr" class="lang-link">TR</a>
        <span class="lang-sep">|</span>
        <a href="/fr/" data-lang="fr" class="lang-link">FR</a>
      </div>

      <!-- Mobile Menu Button -->
      <button class="menu-toggle" id="menuToggle" type="button" aria-label="Menu" aria-expanded="false">
        <span class="menu-icon">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>
    </div>
  </div>
</header>

<!-- Mobile Menu Overlay -->
<div class="menu-overlay" id="menuOverlay"></div>

<!-- Mobile Menu Drawer -->
<aside class="menu-drawer" id="menuDrawer">
  <div class="drawer-header">
    <h2 class="drawer-title" id="drawerTitle">Menu</h2>
    <button class="drawer-close" id="drawerClose" type="button" aria-label="Close">✕</button>
  </div>
  
  <nav class="drawer-nav" id="drawerNav">
    <!-- Links are injected dynamically by header.js based on language -->
  </nav>
</aside>
